name: Check for new Yes on B donations

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  check-donations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml pdfminer.six
      - name: Run donation checker
        id: check
        run: python scripts/check_donations.py
      - name: Commit if new donations found
        if: steps.check.outputs.new_donations == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/donations.json yes-on-b-funding.html
          git commit -m "Auto-update: new Yes on B donation detected [skip ci]"
          git push
